openapi: 3.1.0
info:
  title: GitHub Workflows api
  version: 1.0.0
  description: API contract for frontend-backend communication
  contact:
    name: API support
    email: support@example.command

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://api.example.com
    description: Production server

security: []

tags:
  - name: users
    description: User management operations

paths:
  /users:
    get:
      summary: Get all users
      tags: [users]
      operationId: getUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new user
      tags: [users]
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update user
      tags: [users]
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete user
      tags: [users]
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


components:
  schemas:
    User:
      type: object
      required:
        - id
        - name 
        - email
        - role
      properties:
        id:
          type: integer
          description: User ID
          examples: [1]
        name:
          type: string
          description: User's full name
          examples: ["John Doe"]
          minLength: 1
          maxLength: 100
        email:
          type: string 
          format: email
          description: User's email address
          examples: [john@example.com]
        role:
          type: string
          enum: [admin, user, editor]
          description: User's role
          examples: [user]

    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - role
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          examples: ["Jane Smith"]
        email:
          type: string
          format: email
          examples: [jane@example.com]
        role:
          type: string
          enum: [admin, user, editor]
          examples: [user]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, editor]

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
          examples: ["An error occurred"]
        code:
          type: string
          description: Error code
          examples: [USER_NOT_FOUND]


